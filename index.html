function calcSunTimes(lat, lng) {

const HEB_MONTHS = ["", "ניסן", "אייר", "סיוון", "תמוז", "אב", "אלול", "תשרי", "חשוון", "כסלו", "טבת", "שבט", "אדר", "אדר ב׳"];

function calcVesetWarnings(cycles, manualHaflagah) {
  if (!cycles.length) return [];
  const warnings = [];
  const last = cycles[cycles.length - 1];
  const onah = last.onahStart || "day"; // which onah the period started in

  // 1. Onah Beinonit — day 30 from last period start
  const beinonit = addDays(last.bleedStart, 29);
  warnings.push({
    date: beinonit,
    type: "beinonit",
    onah,
    label: "עונה בינונית",
    desc: `יום 30 מתחילת הווסת · עונת ${onah === "day" ? "יום" : "לילה"}`
  });

  // 2. Veset HaHaflagah — calculate from all available cycle pairs
  if (cycles.length >= 2) {
    // Use the two most recent cycles
    const prev = cycles[cycles.length - 2];
    const interval = daysBetween(prev.bleedStart, last.bleedStart);
    const haflagahDate = addDays(last.bleedStart, interval);
    warnings.push({
      date: haflagahDate,
      type: "haflagah",
      onah,
      label: "וסת ההפלגה",
      desc: `הפלגה של ${interval} ימים · עונת ${onah === "day" ? "יום" : "לילה"}`
    });

    // If 3+ cycles exist, also calculate from prev pair to verify pattern
    if (cycles.length >= 3) {
      const prevPrev = cycles[cycles.length - 3];
      const prevInterval = daysBetween(prevPrev.bleedStart, prev.bleedStart);
      if (prevInterval !== interval) {
        // Different interval — show both as candidates
        const prevHaflagahDate = addDays(last.bleedStart, prevInterval);
        if (prevHaflagahDate !== haflagahDate) {
          warnings.push({
            date: prevHaflagahDate,
            type: "haflagah",
            onah,
            label: "וסת ההפלגה (מחזור קודם)",
            desc: `הפלגה של ${prevInterval} ימים · עונת ${onah === "day" ? "יום" : "לילה"}`
          });
        }
      }
    }
  }

  // 2b. Manual haflagah (when only 1 cycle exists)
  if (manualHaflagah && cycles.length < 2) {
    warnings.push({
      date: manualHaflagah.date,
      type: "haflagah",
      onah: manualHaflagah.onah || onah,
      label: "וסת ההפלגה",
      desc: `הפלגה של ${manualHaflagah.days} ימים (ידני) · עונת ${(manualHaflagah.onah || onah) === "day" ? "יום" : "לילה"}`
    });
  }

  // 3. Veset HaChodesh — same Hebrew day of month (next Gregorian month as approximation)
  const lastBleedDay = new Date(last.bleedStart).getDate();
  const bleedDate = new Date(last.bleedStart);
  const nextMonth = new Date(bleedDate.getFullYear(), bleedDate.getMonth() + 1, lastBleedDay);
  const chodeshDate = nextMonth.toISOString().split("T")[0];
  const hebBleed = gregToHeb(last.bleedStart);
  warnings.push({
    date: chodeshDate,
    type: "chodesh",
    onah,
    label: "וסת החודש",
    desc: `יום ${HEB_DAYS[hebBleed.day]} ${HEB_MONTHS[hebBleed.month]} (קירוב) · עונת ${onah === "day" ? "יום" : "לילה"}`
  });

  // deduplicate by date+type
  const seen = new Set();
  return warnings.filter(w => {
    const k = w.date + w.type;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  }).sort((a, b) => a.date.localeCompare(b.date));
}

  const map = {};

    type: "bleed"

  // Hefsek tahara = day before first clean day

  if (!map[hefsekDate]) map[hefsekDate] = {
    type: "hefsek"

  cycle.days.forEach((day, i) => {

    map[day.date] = {
      type: "clean",
      dayNum: i + 1,
      isClean,
      hasStain
    };
  });
  map[cycle.mikvehDate] = {
    type: "mikveh",
    done: cycle.mikvehDone
  };
  return map;
}

// Firebase init
firebase.initializeApp({
  apiKey: "AIzaSyABRaV3BRf1JjYc-CSVyxhOT1pFDuiogl8",
  authDomain: "beitili-c120c.firebaseapp.com",
  projectId: "beitili-c120c",
  storageBucket: "beitili-c120c.firebasestorage.app",
  messagingSenderId: "1032459665137",
  appId: "1:1032459665137:web:135fcaabbf9ad876e13350"
});
const auth = firebase.auth();
const db   = firebase.firestore();
const STORAGE_KEY = 'tahara-v3';
let uid = null;
let appMounted = false;

function userDoc() { return db.collection('users').doc(uid).collection('data').doc('main'); }

// Sync localStorage → Firestore on every write
const _origSet = Storage.prototype.setItem.bind(localStorage);
Storage.prototype.setItem = function(key, val) {
  _origSet(key, val);
  if (key === STORAGE_KEY && uid) {
    try { userDoc().set(JSON.parse(val)); } catch(e) {}
  }
};

function setStatus(msg, spin) {
  document.getElementById('status-area').innerHTML = spin
    ? `<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div class="spinner"></div><div class="status-txt">${msg}</div></div>`
    : `<div class="status-txt">${msg}</div>`;
}

function doLogin() {
  setStatus('פותחת חלון כניסה...', false);
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    setStatus('שגיאת כניסה — נסי שנית', false);
    console.error('Login error:', err.code, err.message);
  });
}

auth.onAuthStateChanged(async (user) => {
  if (user && !appMounted) {
    appMounted = true;
    uid = user.uid;
    setStatus('טוענת נתונים...', true);
    try {
      const doc = await userDoc().get();
      if (doc.exists) {
        _origSet(STORAGE_KEY, JSON.stringify(doc.data()));
      }
    } catch(e) { console.warn('Firestore load error:', e); }
    // Mount React app (App is already defined — no Babel needed)
    document.getElementById('login-screen').style.display = 'none';
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.App));
  }
});
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}

// ── OneSignal init ────────────────────────────
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "569868ca-1c94-4b39-a57b-1aa8ffdd3afb",
    safari_web_id: "web.onesignal.auto.20cc36d3-e742-47b9-8fc8-37c27a32926f",
    notifyButton: { enable: false }, // we handle our own UI
    welcomeNotification: { disable: true },
  });

  // ── Smart daily reminder check ────────────────
  // Runs when user opens the app — checks if a reminder is due today
  function checkTodayReminders() {
    try {
      const raw = localStorage.getItem('tahara-v3');
      if (!raw) return;
      const { settings, cycles } = JSON.parse(raw);
      if (!settings) return;

      const now = new Date();
      const todayStr = now.toISOString().split('T')[0];
      const hhmm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

      // Check if we already notified today
      const lastCheck = localStorage.getItem('os_last_check');
      if (lastCheck === todayStr) return;
      localStorage.setItem('os_last_check', todayStr);

      const msgs = [];

      // Veset warning today?
      if (settings.vesetRemindersEnabled && cycles?.length) {
        const last = cycles[cycles.length-1];
        const onah = last.onahStart || 'day';
        const onahLabel = onah === 'day' ? 'עונת יום' : 'עונת לילה';
        // Beinonit = day 30
        function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];}
        const beinonit = addDays(last.bleedStart, 29);
        if (beinonit === todayStr) msgs.push(`⏰ עונה בינונית היום — ${onahLabel}`);
        // Haflagah
        if (cycles.length >= 2) {
          const prev = cycles[cycles.length-2];
          const interval = Math.round((new Date(last.bleedStart)-new Date(prev.bleedStart))/86400000);
          const haflagah = addDays(last.bleedStart, interval);
          if (haflagah === todayStr) msgs.push(`⏰ וסת הפלגה היום — ${onahLabel}`);
        }
      }

      // Send notifications via OneSignal
      msgs.forEach((msg, i) => {
        setTimeout(() => {
          OneSignal.User.PushSubscription.optIn().then(() => {
            // Use OneSignal API to send to self
            fetch('https://onesignal.com/api/v1/notifications', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                app_id: '569868ca-1c94-4b39-a57b-1aa8ffdd3afb',
                include_aliases: { external_id: [OneSignal.User.externalId || 'self'] },
                target_channel: 'push',
                headings: { he: 'ביתילי', en: 'ביתילי' },
                contents: { he: msg, en: msg },
              })
            }).catch(()=>{
              // Fallback: browser notification
              if (Notification.permission === 'granted') {
                new Notification('ביתילי', { body: msg, icon: '/icon-192.png', dir: 'rtl' });
              }
            });
          });
        }, i * 2000);
      });

      // Morning/evening reminder via browser Notification
      if (settings.remindersEnabled) {
        if (Notification.permission !== 'granted') {
          Notification.requestPermission();
        }
        // Schedule morning reminder
        function scheduleNotif(timeStr, title, body) {
          const [h, m] = timeStr.split(':').map(Number);
          const target = new Date();
          target.setHours(h, m, 0, 0);
          const delay = target - now;
          if (delay > 0 && delay < 86400000) {
            setTimeout(() => {
              if (Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/icon-192.png', dir: 'rtl' });
              }
            }, delay);
          }
        }
        scheduleNotif(
          settings.morningReminder || '07:00',
          'ביתילי — בדיקת בוקר',
          `זמן לבדיקת בוקר לאחר ${settings.netz || '06:15'} (הנץ)`
        );
        scheduleNotif(
          settings.eveningReminder || '19:00',
          'ביתילי — בדיקה לפני השקיעה',
          `זמן לבדיקה לפני השקיעה (${settings.shkia || '19:09'})`
        );
      }
    } catch(e) { console.warn('reminder check:', e); }
  }

  // Request permission + check reminders when app opens
  await OneSignal.User.PushSubscription.optIn();
  setTimeout(checkTodayReminders, 2000);
});
setInterval(() => {
  if (navigator.serviceWorker?.controller) {
    try {
      const raw = localStorage.getItem('tahara-v3');
      const settings = raw ? JSON.parse(raw).settings : null;
      navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_CHECK', settings});
    } catch(e) {}
  }
}, 60000);
</script>
